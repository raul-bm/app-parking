services:
  postgres:
    image: postgres:16
    container_name: parking_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: parking_app_adminer
    restart: unless-stopped
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: parking_app_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: parking_app_frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
